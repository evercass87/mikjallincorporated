<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <title>Defesa | Mikjáll Incorporated</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400;700&family=JetBrains+Mono&display=swap' rel='stylesheet'>
    <style>
        :root { --bg: #000; --border: #151515; --matrix: #00FF41; --text: #fff; --dim: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-left: 60px; }
        
        nav { height: 100px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 60px; justify-content: space-between; }
        .back-link { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--matrix); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }

        .content { padding: 100px 60px; }
        .hero-label { font-family: 'JetBrains Mono'; color: var(--dim); font-size: 11px; letter-spacing: 10px; margin-bottom: 40px; display: block; }
        h1 { font-size: 8rem; font-weight: 100; letter-spacing: -10px; line-height: 0.8; text-transform: uppercase; margin-bottom: 80px; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        .info-box { border: 1px solid var(--border); padding: 50px; }
        .info-box h2 { font-size: 10px; letter-spacing: 5px; color: var(--dim); text-transform: uppercase; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        
        .data-table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono'; font-size: 12px; }
        .data-table td { padding: 20px 0; border-bottom: 1px solid #111; color: #444; }
        .data-table b { color: #fff; }
    </style>
</head>
<body>
    <nav>
        <span>MIKJÁLL // <b>DEFENSE_CORE</b></span>
        <a href="index.html" class="back-link">← RETURN_TO_BASE</a>
    </nav>
    <div class="content">
        <span class="hero-label">UNIT_AMERICAN_DOG_SEC</span>
        <h1>Offensive<br>Intelligence</h1>
        
        <div class="info-grid">
            <div class="info-box">
                <h2>Operational_Logs</h2>
                <table class="data-table">
                    <tr><td>STATUS</td><td><b style="color:var(--matrix)">ACTIVE_MITIGATION</b></td></tr>
                    <tr><td>THREAT_LEVEL</td><td><b>CRITICAL_OVERSIGHT</b></td></tr>
                    <tr><td>LAST_EVENT</td><td><b>SQL_INJECTION_NEUTRALIZED</b></td></tr>
                </table>
            </div>
            <div class="info-box">
                <h2>Infrastructure</h2>
                <table class="data-table">
                    <tr><td>ENCRYPTION</td><td><b>AES-XTS-512</b></td></tr>
                    <tr><td>KERNEL_LAYER</td><td><b>HARDENED_6.12</b></td></tr>
                    <tr><td>NODE_LOCATION</td><td><b>REYKJAVÍK // IS</b></td></tr>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
