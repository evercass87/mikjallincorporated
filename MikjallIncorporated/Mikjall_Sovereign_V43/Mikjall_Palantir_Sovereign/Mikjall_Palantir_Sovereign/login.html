<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <title>Mikjáll // Secure Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@100;400;900&family=JetBrains+Mono&display=swap' rel='stylesheet'>
    <style>
        :root { --bg: #050505; --ui-matrix: #00FF41; --ui-border: #222; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .grid-bg { position: fixed; width: 100%; height: 100%; z-index: -1; background-image: linear-gradient(var(--ui-border) 1px, transparent 1px), linear-gradient(90deg, var(--ui-border) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.1; }
        
        .login-box { width: 400px; background: #000; border: 1px solid var(--ui-border); padding: 60px 40px; position: relative; }
        .login-box::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--ui-matrix); box-shadow: 0 0 15px var(--ui-matrix); }
        
        h2 { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--ui-matrix); letter-spacing: 5px; margin-bottom: 40px; text-transform: uppercase; }
        .input-group { margin-bottom: 25px; }
        label { font-family: 'JetBrains Mono'; font-size: 8px; color: #444; display: block; margin-bottom: 10px; letter-spacing: 2px; }
        input { width: 100%; background: #080808; border: 1px solid #1a1a1a; padding: 15px; color: #fff; font-family: 'JetBrains Mono'; font-size: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--ui-matrix); background: #000; }
        
        .btn-auth { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--ui-matrix); color: var(--ui-matrix); font-family: 'JetBrains Mono'; font-size: 10px; letter-spacing: 3px; cursor: pointer; transition: 0.3s; }
        .btn-auth:hover { background: var(--ui-matrix); color: #000; }
        
        .back-home { position: absolute; bottom: -40px; left: 0; font-family: 'JetBrains Mono'; font-size: 9px; color: #333; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="login-box">
        <h2>Sovereign_Access_Gateway</h2>
        <div class="input-group">
            <label>OPERATOR_ID</label>
            <input type="text" id="email" placeholder="NHOST">
        </div>
        <div class="input-group">
            <label>SCHEIDT_KEY</label>
            <input type="password" id="password" placeholder="********">
        </div>
        <button class="btn-auth" id="loginBtn">INITIALIZE_HANDSHAKE</button>
        <a href="/" class="back-home">← Return to Public Terminal</a>
    </div>

    <script>
        // Lógica de Autenticação Supabase aqui
        document.getElementById('loginBtn').addEventListener('click', () => {
            const user = document.getElementById('email').value;
            if(user.toLowerCase() === 'nhost') {
                window.location.href = '/dashboard'; // Rota protegida
            }
        });
    </script>
</body>
</html>
