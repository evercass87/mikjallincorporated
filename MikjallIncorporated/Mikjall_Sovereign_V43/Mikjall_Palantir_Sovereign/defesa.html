<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <title>Cyber Defense | Mikjáll Inc.</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700;900&family=JetBrains+Mono&display=swap' rel='stylesheet'>
    <style>
        :root { --bg: #050505; --border: #1a1a1a; --text: #fff; --dim: #555; --accent: #00FF41; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); }
        nav { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 40px; justify-content: space-between; }
        .back { color: var(--accent); text-decoration: none; font-size: 10px; font-family: 'JetBrains Mono'; letter-spacing: 2px; }
        .hero { padding: 120px 40px; border-bottom: 1px solid var(--border); }
        .hero span { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--accent); letter-spacing: 5px; }
        .hero h1 { font-size: 5rem; font-weight: 100; letter-spacing: -5px; text-transform: uppercase; margin-top: 20px; }
        .data-section { padding: 60px 40px; }
        .data-table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono'; font-size: 12px; }
        .data-table tr { border-bottom: 1px solid var(--border); }
        .data-table td { padding: 25px 0; color: var(--dim); }
        .data-table b { color: #fff; }
    </style>
</head>
<body>
    <nav><span>MIKJÁLL // <b>DEFESA</b></span><a href='/' class='back'>← RETURN_TO_HOME</a></nav>
    <div class='hero'>
        <span>UNIT_AMERICAN_DOG_SEC</span>
        <h1>Defesa<br>Ofensiva</h1>
    </div>
    <div class='data-section'>
        <table class='data-table'>
            <tr><td>PROTOCOL_TYPE</td><td style='text-align:right'><b>V-NEXO_SHIELD</b></td></tr>
            <tr><td>MITIGATION_STATUS</td><td style='text-align:right'><b>ACTIVE</b></td></tr>
            <tr><td>ENCRYPTION_LAYER</td><td style='text-align:right'><b>AES-512-GCM</b></td></tr>
        </table>
    </div>
</body>
</html>
